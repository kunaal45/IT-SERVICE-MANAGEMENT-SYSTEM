<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>ITSM Portal Login</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='12' fill='%234a90d9'/%3E%3Ccircle cx='32' cy='26' r='16' fill='rgba(255,255,255,0.18)'/%3E%3Ccircle cx='32' cy='26' r='7' fill='rgba(255,255,255,0.28)'/%3E%3Ctext x='32' y='53' font-family='Arial,sans-serif' font-weight='900' font-size='13' fill='white' text-anchor='middle'%3EITSMS%3C/text%3E%3C/svg%3E">
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap"
        rel="stylesheet" />
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet" />
    <script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#00d4ff",
                        "background-light": "#0c1220",
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"]
                    },
                },
            },
        }
    </script>
    <link rel="stylesheet" href="css/custom.css">
    <link rel="stylesheet" href="css/theme.css">
</head>

<body class="font-display bg-background-light min-h-screen flex items-center justify-center p-4">
    <div class="w-full max-w-md">
        <!-- Logo and Branding -->
        <div class="text-center mb-8">
            <div class="inline-flex items-center justify-center w-16 h-16 rounded-2xl mb-4" style="background:linear-gradient(135deg,#00d4ff,#0077aa);box-shadow:0 8px 24px rgba(0,212,255,0.35)">
                <span class="material-icons" style="color:#000d1a;font-size:28px">settings_suggest</span>
            </div>
            <h1 class="text-2xl font-bold" style="color:#e2e8f0">IT Service Management</h1>
            <p class="mt-1" style="color:#3d5166;font-size:13px;letter-spacing:1px">ITSM PORTAL</p>
        </div>

        <!-- Login Card -->
        <div class="bg-white rounded-xl shadow-xl border border-slate-100 overflow-hidden">
            <div class="p-8">
                <h2 class="text-xl font-semibold text-slate-800 mb-6">Sign In</h2>

                <form id="loginForm" class="space-y-5">
                    <!-- Email Field -->
                    <div>
                        <label class="block text-sm font-medium text-slate-700 mb-1.5" for="email">
                            Email Address
                        </label>
                        <div class="relative">
                            <span
                                class="material-icons absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 text-xl">mail_outline</span>
                            <input
                                class="w-full pl-10 pr-4 py-2.5 bg-slate-50 border border-slate-200 rounded-lg focus:ring-2 focus:ring-primary/20 focus:border-primary transition-colors text-slate-900"
                                id="email" name="email" placeholder="name@college.edu" type="email" required />
                        </div>
                    </div>

                    <!-- Password Field -->
                    <div>
                        <div class="flex justify-between mb-1.5">
                            <label class="block text-sm font-medium text-slate-700" for="password">
                                Password
                            </label>
                            <a class="text-sm font-medium text-primary hover:text-primary/80 transition-colors"
                                href="#">
                                Forgot Password?
                            </a>
                        </div>
                        <div class="relative">
                            <span
                                class="material-icons absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 text-xl">lock_open</span>
                            <input
                                class="w-full pl-10 pr-4 py-2.5 bg-slate-50 border border-slate-200 rounded-lg focus:ring-2 focus:ring-primary/20 focus:border-primary transition-colors text-slate-900"
                                id="password" name="password" placeholder="••••••••" type="password" required />
                        </div>
                    </div>

                    <!-- Error Message (hidden by default) -->
                    <div id="errorMessage" class="hidden p-3 bg-red-50 border border-red-200 rounded-lg">
                        <p class="text-sm text-red-700" id="errorText"></p>
                    </div>

                    <!-- Remember Me -->
                    <div class="flex items-center">
                        <input class="w-4 h-4 text-primary bg-slate-50 border-slate-300 rounded focus:ring-primary/20"
                            id="remember" type="checkbox" />
                        <label class="ml-2 text-sm text-slate-600" for="remember">
                            Keep me logged in
                        </label>
                    </div>

                    <!-- Login Button -->
                    <button
                        class="w-full py-3 bg-primary hover:bg-primary/90 text-white font-semibold rounded-lg shadow-md shadow-primary/20 transition-all"
                        type="submit">
                        Sign In
                    </button>
                </form>
            </div>

        </div>

        <!-- Footer -->
        <p class="text-center mt-8 text-sm text-slate-500">
            © 2024 College ITSM Portal Project. All rights reserved.
        </p>
    </div>

    <script src="js/app.js"></script>
    <script>
        // Login Form Handler
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const errorDiv = document.getElementById('errorMessage');
            const errorText = document.getElementById('errorText');

            // Hide previous errors
            errorDiv.classList.add('hidden');

            const ok = await handleLogin(email, password);
            if (!ok) {
                errorText.textContent = 'Invalid email or password';
                errorDiv.classList.remove('hidden');
            }
        });
    </script>
</body>

</html>
