spring.application.name=itsm-system

# Server Configuration
server.port=8080
server.servlet.context-path=/

# Database Configuration
spring.datasource.url=jdbc:mysql://localhost:3306/itsm_db
spring.datasource.username=root
spring.datasource.password=2005
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA/Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.use_sql_comments=true

# JWT Configuration
app.jwt.secret=mysupersecuresecretsupersecuresecretsupersecuresecretsupersecure
app.jwt.expiration=86400000

# Logging
logging.level.root=INFO
logging.level.com.itsm.itsmsystem=DEBUG
logging.level.org.springframework.security=DEBUG

# Exception Handler
server.error.include-message=always
server.error.include-stacktrace=never

# Jackson
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.time-zone=UTC
