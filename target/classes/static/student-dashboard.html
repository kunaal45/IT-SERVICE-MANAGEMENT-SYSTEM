<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>User Ticket Portal - ITSM</title>
    <meta name="description" content="ITSM User Ticket Portal – raise and track your IT support requests." />
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='12' fill='%234a90d9'/%3E%3Ccircle cx='32' cy='26' r='16' fill='rgba(255,255,255,0.18)'/%3E%3Ccircle cx='32' cy='26' r='7' fill='rgba(255,255,255,0.28)'/%3E%3Ctext x='32' y='53' font-family='Arial,sans-serif' font-weight='900' font-size='13' fill='white' text-anchor='middle'%3EITSMS%3C/text%3E%3C/svg%3E">
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap"
        rel="stylesheet" />
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet" />
    <script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#00d4ff",
                        "background-light": "#0c1220",
                    },
                    fontFamily: { "display": ["Inter", "sans-serif"] },
                },
            },
        }
    </script>
    <link rel="stylesheet" href="css/custom.css">
    <link rel="stylesheet" href="css/theme.css">
    <style>
        body { font-family: Inter, sans-serif; }
    </style>
</head>

<body class="bg-background-light min-h-screen font-display">

    <!-- Header -->
    <header class="bg-white border-b border-slate-200">
        <div class="max-w-7xl mx-auto px-8 py-4">
            <div class="flex items-center justify-between">
                <div class="flex items-center gap-4">
                    <div class="w-12 h-12 rounded-xl flex items-center justify-center" style="background:linear-gradient(135deg,#00d4ff,#0077aa);box-shadow:0 4px 16px rgba(0,212,255,0.3)">
                        <span class="material-icons" style="color:#000d1a;font-size:22px">confirmation_number</span>
                    </div>
                    <div>
                        <h1 class="text-xl font-bold" style="color:#e2e8f0">User Ticket Portal</h1>
                    </div>
                </div>
                <div class="flex items-center gap-4">
                    <button class="relative p-2 text-slate-600 hover:bg-slate-100 rounded-lg">
                        <span class="material-icons">notifications</span>
                    </button>

                    <!-- Profile Dropdown -->
                    <div class="relative group z-50">
                        <button
                            class="flex items-center gap-3 pl-4 border-l border-slate-200 hover:bg-slate-50 p-2 rounded-lg transition-colors">
                            <div class="text-right">
                                <div id="userName" class="text-sm font-medium text-slate-800">Student User</div>
                                <div class="text-xs text-slate-500">STUDENT</div>
                            </div>
                            <div
                                class="w-10 h-10 bg-gradient-to-br from-primary to-blue-600 rounded-full flex items-center justify-center text-white font-semibold">
                                S
                            </div>
                        </button>

                        <!-- Dropdown Menu -->
                        <div
                            class="absolute right-0 mt-2 w-48 bg-white rounded-xl shadow-lg border border-slate-100 overflow-hidden hidden group-hover:block">
                            <div class="p-2">
                                <button onclick="logout()"
                                    class="w-full flex items-center gap-2 px-3 py-2 text-sm text-red-600 hover:bg-red-50 rounded-lg">
                                    <span class="material-icons text-lg">logout</span>
                                    Logout
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <main class="max-w-7xl mx-auto px-8 py-8">

        <!-- Statistics Cards -->
        <div class="grid grid-cols-3 gap-6 mb-8">
            <div class="bg-white rounded-xl border border-slate-200 p-6">
                <div class="flex items-center justify-between mb-2">
                    <div class="text-sm font-medium text-slate-600">Total Tickets</div>
                    <div class="w-10 h-10 bg-blue-100 rounded-lg flex items-center justify-center">
                        <span class="material-icons text-blue-600">confirmation_number</span>
                    </div>
                </div>
                <div id="totalTicketsCount" class="text-3xl font-bold text-slate-900 mb-1">12</div>
            </div>

            <div class="bg-white rounded-xl border border-slate-200 p-6">
                <div class="flex items-center justify-between mb-2">
                    <div class="text-sm font-medium text-slate-600">Open Tickets</div>
                    <div class="w-10 h-10 bg-orange-100 rounded-lg flex items-center justify-center">
                        <span class="material-icons text-orange-600">pending</span>
                    </div>
                </div>
                <div id="openTicketsCount" class="text-3xl font-bold text-slate-900 mb-1">3</div>
            </div>

            <div class="bg-white rounded-xl border border-slate-200 p-6">
                <div class="flex items-center justify-between mb-2">
                    <div class="text-sm font-medium text-slate-600">Resolved Tickets</div>
                    <div class="w-10 h-10 bg-green-100 rounded-lg flex items-center justify-center">
                        <span class="material-icons text-green-600">check_circle</span>
                    </div>
                </div>
                <div id="resolvedTicketsCount" class="text-3xl font-bold text-slate-900 mb-1">9</div>
            </div>
        </div>

        <!-- Main Grid -->
        <div class="grid grid-cols-3 gap-6">

            <!-- Raise a Ticket Form -->
            <div class="bg-white rounded-xl shadow-lg border-2 border-primary/10 overflow-hidden">
                <div
                    class="bg-gradient-to-r from-primary/5 to-blue-50/50 p-6 border-b border-primary/10 flex items-center gap-3">
                    <div class="w-10 h-10 bg-primary/10 rounded-lg flex items-center justify-center">
                        <span class="material-icons text-primary text-xl">add_circle</span>
                    </div>
                    <div>
                        <h2 class="text-lg font-bold text-slate-800">Raise a Ticket</h2>
                        <p class="text-xs text-slate-500">Submit a new support request</p>
                    </div>
                </div>

                <div class="p-6">
                    <form id="ticketForm" class="space-y-5">
                        <div>
                            <label class="block text-sm font-semibold text-slate-700 mb-2">Issue Title</label>
                            <input type="text" id="ticketTitle" required placeholder="Brief summary of the issue"
                                class="w-full px-4 py-2.5 bg-slate-50 border border-slate-200 rounded-lg focus:ring-2 focus:ring-primary/20 focus:border-primary text-sm transition-all focus:bg-white">
                        </div>

                        <div>
                            <label class="block text-sm font-semibold text-slate-700 mb-2">Priority</label>
                            <select id="ticketPriority" required
                                class="w-full px-4 py-2.5 bg-slate-50 border border-slate-200 rounded-lg focus:ring-2 focus:ring-primary/20 focus:border-primary text-sm transition-all focus:bg-white">
                                <option value="LOW">Low - Minimal Impact</option>
                                <option value="MEDIUM" selected>Medium - Standard Issue</option>
                                <option value="HIGH">High - Urgent / Blocking</option>
                            </select>
                        </div>

                        <div>
                            <label class="block text-sm font-semibold text-slate-700 mb-2">Description</label>
                            <textarea id="ticketDescription" required rows="4"
                                placeholder="Describe your issue in detail..."
                                class="w-full px-4 py-2.5 bg-slate-50 border border-slate-200 rounded-lg focus:ring-2 focus:ring-primary/20 focus:border-primary text-sm resize-none transition-all focus:bg-white"></textarea>
                        </div>

                        <button type="submit"
                            class="w-full bg-primary hover:bg-blue-600 text-white py-3 rounded-lg font-semibold shadow-md shadow-primary/20 transition-all flex items-center justify-center gap-2 group">
                            <span class="material-icons group-hover:translate-x-1 transition-transform">send</span>
                            Submit Ticket
                        </button>
                    </form>
                </div>
            </div>

            <!-- My Recent Tickets -->
            <div class="col-span-2 bg-white rounded-xl border border-slate-200 overflow-hidden">
                <div class="p-6 border-b border-slate-200 flex items-center justify-between">
                    <h2 class="text-lg font-semibold text-slate-800">My Recent Tickets</h2>
                    <a href="#" class="text-sm text-primary hover:underline">View All</a>
                </div>

                <div class="overflow-x-auto">
                    <table class="w-full">
                        <thead class="bg-slate-50 border-b border-slate-200">
                            <tr class="text-xs font-semibold text-slate-600 uppercase tracking-wide">
                                <th class="px-6 py-3 text-left">Ticket ID & Title</th>
                                <th class="px-6 py-3 text-left">Status</th>
                                <th class="px-6 py-3 text-left">SLA Deadline</th>
                                <th class="px-6 py-3 text-right">Action</th>
                            </tr>
                        </thead>
                        <tbody id="ticketsList" class="divide-y divide-slate-100">
                            <!-- Populated by JavaScript -->
                        </tbody>
                    </table>
                </div>
            </div>
        </div>

        <!-- Help Desk Section Removed as per requirement -->

    </main>

    <script src="js/app.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function () {
            checkAuth();
            loadUserInfo();
            loadStudentTickets();

            document.getElementById('ticketForm').addEventListener('submit', handleTicketSubmit);
        });

        async function loadStudentTickets() {
            const tickets = await loadTickets();
            const ticketsList = document.getElementById('ticketsList');

            if (!tickets || tickets.length === 0) {
                ticketsList.innerHTML = '<tr><td colspan="4" class="px-6 py-8 text-center text-slate-500">No tickets found</td></tr>';
                return;
            }

            // Update counts
            document.getElementById('totalTicketsCount').textContent = tickets.length;
            document.getElementById('openTicketsCount').textContent = tickets.filter(t => t.status === 'OPEN' || t.status === 'ASSIGNED').length;
            document.getElementById('resolvedTicketsCount').textContent = tickets.filter(t => t.status === 'RESOLVED' || t.status === 'CLOSED').length;

            ticketsList.innerHTML = tickets.slice(0, 5).map(ticket => {
                const slaClass = ticket.slaBreached ? 'text-red-600' : 'text-orange-600';
                const slaText = ticket.slaBreached ? 'Completed' : '2 hours remaining';
                const statusColors = {
                    'OPEN': 'bg-blue-100 text-blue-700',
                    'ASSIGNED': 'bg-purple-100 text-purple-700',
                    'IN_PROGRESS': 'bg-yellow-100 text-yellow-700',
                    'RESOLVED': 'bg-green-100 text-green-700',
                    'CLOSED': 'bg-slate-100 text-slate-700'
                };

                return `
                <tr class="hover:bg-slate-50 cursor-pointer" onclick="window.location.href='ticket-details.html?id=${ticket.id}'">
                    <td class="px-6 py-4">
                        <div class="font-medium text-primary">#${ticket.id}</div>
                        <div class="text-sm text-slate-600">${ticket.title}</div>
                    </td>
                    <td class="px-6 py-4">
                        <span class="px-3 py-1 rounded-full text-xs font-medium ${statusColors[ticket.status] || 'bg-slate-100 text-slate-700'}">
                            ${ticket.status}
                        </span>
                    </td>
                    <td class="px-6 py-4">
                        <div class="text-sm ${slaClass} font-medium">${slaText}</div>
                        <div class="text-xs text-slate-500">${ticket.slaBreached ? 'Sept 10, 2:15 PM' : 'Sept 12, 4:00 PM'}</div>
                    </td>
                    <td class="px-6 py-4 text-right">
                        <button class="p-2 hover:bg-slate-100 rounded-lg">
                            <span class="material-icons text-slate-400">visibility</span>
                        </button>
                    </td>
                </tr>
            `;
            }).join('');
        }

        async function handleTicketSubmit(e) {
            e.preventDefault();

            const formData = {
                title: document.getElementById('ticketTitle').value,
                priority: document.getElementById('ticketPriority').value,
                description: document.getElementById('ticketDescription').value
            };

            const result = await createTicket(formData);

            if (result) {
                document.getElementById('ticketForm').reset();
                loadStudentTickets();
            }
        }
    </script>
</body>

</html>
